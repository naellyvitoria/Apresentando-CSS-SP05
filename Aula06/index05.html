  <link rel="stylesheet" href="./css/style05.css">

  <title>Aula 06 CSS</title>
</head>
<body>
  
  <!-- Definindo estilos de fonte com CSS -->

  <h2>Exemplos de estilos de fontes com o CSS</h2>

  <p class="ex1">Exemplo de estilo normal</p>

  <p class="ex2">Exemplo de estilo italic</p>

  <p class="ex3">Exemplo de estilo oblique</p>

  <hr>

  <p class="p-lighter">Exemplo de fonte com o peso lighter</p>
  <p class="p-normal">Exemplo de fonte com o peso normal</p>
  <p class="p-bold">Exemplo de fonte com o peso bold</p>
  <p class="p-bolder">Exemplo de fonte com o peso bolder</p>
