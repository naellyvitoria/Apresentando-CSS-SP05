<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 01 CSS</title>

    <style>

        p {
            color: blue;
            font-size: 30px;
            font-family: sans-serif;
        }

        #paragrafo-id {
            color: forestgreen;
            font-size: 24px;
            font-family: monospace;
        }

        .centro {
            font-size: 20px;
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            color: goldenrod;
            text-align: center;
        }

        h3.centro {
            font-size: 40px;
            color: orangered;
        }

        p.centro {
            color: pink;
            font-size: 300%;
        }
    </style>
</head>
<body>
    
    <!-- Introdução ao CSS -->

    <h2>Exemplo de conteúdo alterado pelo CSS</h2>
    <p>Somente a dor coletiva gera união</p>

    <p>São Paulo</p>

    <p>Vermelho</p>

    <hr>

    <h2>Exemplo de Seletor com ID</h2>
    <p id="paragrafo-id">Copa do Mundo</p>

    <hr>

    <h2>Exemplo de Seletor com class</h2>

    <h3 class="centro">Exemplo de título</h3>

    <p class="centro">Somente a dor coletiva gera união</p>

    <p class="centro">Esse parágrafo pertence a duas classes ao mesmo tempo</p>
    

</body>
</html>
