  <title>Aula 10 CSS</title>
</head>
<body>
  
  <!-- Grid Layout -->

  <h2>Exemplos de espaçamento entre os itens de grade</h2>

  <h3>column-gap: 30px</h3>

  <div class="ex1">
    <div>1</div>
    <div>2</div>
    <div>3</div>
    <div>4</div>
    <div>5</div>
    <div>6</div>

  <h3>row-gap: 30px</h3>

  <div class="ex2">
    <div>1</div>
    <div>2</div>
    <div>3</div>
    <div>4</div>
    <div>5</div>
    <div>6</div>
  </div>

  <h3>gap: 30px</h3>

  <div class="ex3">
    <div>1</div>
    <div>2</div>
    <div>3</div>
    <div>4</div>
    <div>5</div>
    <div>6</div>
  </div>
